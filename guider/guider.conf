        "GUIDER list",
        "ls -lha"
    ]
}



'''
[ LLM Description ]

Enable LLM integration by specifying config file with -C option:
    # guider.py ask "Analyze" -q LLMFILE:data.json -C guider.conf

Priority: -q option > config file > environment variable

- PROVIDER: Default LLM provider
    [ claude / gemini / openai / custom-claude / custom-gemini / custom-openai ]

- MODEL: Default model name (single model)
    Provider-specific model names:
    - claude: opus, sonnet, haiku
    - gemini: gemini-pro, gemini-pro-vision
    - openai: gpt-4, gpt-3.5-turbo

- MODELS: Multiple models per provider (optional)
    Provider-specific model lists for comparison:
    {
        "CLAUDE":        ["opus", "sonnet", "haiku"],
        "OPENAI":        ["gpt-4", "gpt-3.5-turbo"],
        "GEMINI":        ["gemini-pro"],
        "CUSTOM_CLAUDE": [],   (model names for custom-claude provider)
        "CUSTOM_OPENAI": [],   (model names for custom-openai provider)
        "CUSTOM_GEMINI": []    (model names for custom-gemini provider)
    }
    -q usage: LLMMODEL:opus:sonnet:haiku (colon-separated)
    env usage: ANTHROPIC_MODELS=opus:sonnet:haiku
    Priority: -q LLMMODEL > config MODELS > env *_MODELS

- CACHE: Enable prompt caching
    [ 1:enabled / 0:disabled ]

- SYSTEM: Default system prompt for chat mode
    Custom instruction for LLM behavior

- API_KEYS: API authentication keys
    - ANTHROPIC: Claude API key (sk-ant-...)
    - GOOGLE: Gemini API key (AIza...)
    - OPENAI: OpenAI API key (sk-...)
    - CUSTOM: Custom API key for custom-* providers

- CUSTOM_BASE_URL: Base URL for custom API endpoints
    Example: https://api.example.com/v1

- CONTEXT: additional data sources to collect during AI analysis (optional)
    data is collected only when each key is present; omit to skip
    MEMINFO    list of /proc/meminfo field names OR true (auto-select key fields)
    DMESG      int — last N kernel messages from /dev/kmsg
    DISKSTATS  true — per-device I/O stats from /proc/diskstats
    CPUSTAT    true — per-CPU usage % from /proc/stat
    INTERRUPTS int — top N IRQs by count from /proc/interrupts
    SOFTIRQS   true — all soft IRQ counters from /proc/softirqs
    VMSTAT     list of field names OR true — virtual memory stats from /proc/vmstat
    BUDDYINFO  true — memory fragmentation info from /proc/buddyinfo
    PSI        true — CPU/memory/IO pressure levels from /proc/pressure/*
    SLABINFO   list of slab names OR true — slab allocator stats from /proc/slabinfo
    BINDER     true — Android Binder stats (Android only)
    CPUFREQ    true — current frequency per CPU (MHz)

- ASKRUN: auto-escalation config for AI ASKRUN events (optional)
    AUTO_ESCALATE "true"|"false" — enable auto-escalation (default: false)
    MAX_AUTO_CMDS int — max total commands including auto-inserted (default: 3, safety cap)
    SEVERITY_ACTIONS dict — pre-commands to run per AI severity level
        keys: critical | high | medium | low
        values: list of guider commands (SNAPSHOT, GETDUMP, SAVE, INTERVAL:N, etc.)
    SUBSYSTEM_ACTIONS dict — additional commands per AI-identified subsystem
        keys: cpu | mem | io | net | binder | irq | sched | gpu | bpf
        values: list of guider commands
    * all auto-inserted commands must pass whitelist validation
    * AUTO_ESCALATE must be set to "true" to activate (default false = opt-in)

- BPF command AI analysis options (passed via -q):
    ASKAI[:<PROMPT>]    run AI analysis every interval (analysis output only, no commands)
    AIPERIODIC:<SEC>    periodic AI trend summary every N seconds (ctop/BPF combined)
    LLMRATELIMIT:<SEC>  minimum interval between AI calls (default: 60s)
    LLMPROVIDER:<NAME>  LLM provider (claude/openai/gemini)
    LLMMODEL:<NAME>     model name to use
    examples:
        guider bpfstacktop -q ASKAI, LLMPROVIDER:claude -i 5
        guider bpfrunqtop -q AIPERIODIC:60, LLMPROVIDER:claude -R 300
        guider bpfwaittop -q ASKAI:"Identify blocking hotspots", LLMPROVIDER:claude
        guider ctop -q AIPERIODIC:120, LLMPROVIDER:claude

Security:
    chmod 600 guider.conf  # Protect API keys
'''

<llm>
{
    "PROVIDER": "",
    "MODEL": "",
    "MODELS": {
        "CLAUDE": [],
        "OPENAI": [],
        "GEMINI": [],
        "CUSTOM_CLAUDE": [],
        "CUSTOM_OPENAI": [],
        "CUSTOM_GEMINI": []
