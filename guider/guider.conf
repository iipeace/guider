'''
[ Server Description ]

- COMMAND: shortcut for commands

- INIT: commands executed remotely when connected
    - apply:    switch flag
    - perm:     requirement for permission
    - interval: periodic interval for executing command (time string: "10s", "5m"; unlike threshold interval which uses tick count)
    - duration: execution timeout for the command (e.g. "10s", "5m"); terminates via SIGALRM if exceeded
    - command:  command set
    - oneshot:  oneshot flag (true/false)
    - explain:  description

- EVENT: event handlers
    - name:    event name
    - apply:   switch flag
    - command: commands executed when the event occur
    - handler: Python functions called when the event occur
               format: "<path>:<function>[:<arg1>:<arg2>...]"
               the function is called in a child process via dynamic import
               example: "./handler.py:on_event:arg1"
    - explain: description

- CHARACTER
    - #: ignore a line
    - ''': ignore specific range
'''

<server>
{
    "COMMAND": {

        "CMD_RTOP": "GUIDER rtop -Q -i 3 -C",
        "CMD_DOWN": "download:/tmp/*@./backup/",
        "CMD_MAIL": "mail -s \"Warning Report\" master@github.com"

    },

    "INIT": [

        {
            "apply": "false",
            "perm": "none",
            "oneshot": "true",
            "duration": "10s",
            "command": ["CMD_RTOP"],
            "explain": "print system stat in JSON format from the new node to stdout"
        },

        {
            "apply": "false",
            "perm": "none",
            "oneshot": "true",
            "command": ["CMD_RTOP->cat"],
            "explain": "deliver system stat in JSON format from the new node to the cat process in local machine through pipe"
        },

        {
            "apply": "false",
            "perm": "root",
            "oneshot": "false",
            "interval": "10s",
            "command": ["CMD_DOWN"],
            "explain": "download specific files from the new node every 10 seconds"
        }

    ],

    "EVENT": [

        {
            "apply": "false",
            "name": "TEST",
            "command": ["ls -lha", "CMD_MAIL"],
            "handler": ["./test.py:test"],
            "explain": "make a snapshot image for system"
        }

    ]
}



