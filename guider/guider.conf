    - minFreq    minimum frequency (kHz)
    - maxFreq    maximum frequency (kHz)
    - governor   CPU governor name (string); comp:eq for exact match (e.g. "schedutil")

    < gpu >
    - total      total GPU usage for system (%)

    < mem >
    - available        available memory for system (MB/%)
    - free             free memory for system (MB/%)
    - anon             anonymous memory for system (MB/%)
    - file             file cache for system (MB/%)
    - slab             slab cache for system (MB/%)
    - cache            total cache for system (MB/%)
    - kernel           kernel memory for system (MB/%)
    - freeDiff         free memory diff for system (MB/%)
    - availableDiff    available memory diff for system (MB/%)
    - anonDiff         anonymous memory diff for system (MB/%)
    - fileDiff         file cache diff for system (MB/%)
    - slabDiff         slabcache diff for system (MB/%)
    - pgDirty          dirty page for system (PAGE)
    - pgRclmBg         background reclaimed memory for system (PAGE)
    - pgRclmFg         foreground reclaimed memory for system (PAGE)
    - nrMinFlt         minor fault for system (PAGE)
    - pgMlock          page lock for system (PAGE)
    - oomKill          OOM kill count per monitoring interval (per-interval delta)
    - nrTickLmk        LMK kills per monitoring interval (per-interval delta; Android only)
    - nrBootLmk        total LMK kills since guider started (cumulative; Android only)
    - nrTotalLmk       total LMK kills since system boot (from lmkd socket LMK_GETKILLCNT; Android only)
    - nrTickLmkFg      LMK kills on fg apps (adj 0-200) per interval (Android only)
    - nrBootLmkFg      LMK kills on fg apps since guider started (Android only)
    - nrTotalLmkFg     LMK kills on fg apps since system boot (Android only)
    - nrTickLmkBg      LMK kills on bg apps (adj 201-999) per interval (Android only)
    - nrBootLmkBg      LMK kills on bg apps since guider started (Android only)
    - nrTotalLmkBg     LMK kills on bg apps since system boot (Android only)
    - cmaFree          cma free memory (MB/%)
    - cmaDev           cma device memory (MB/%)
    - rss              Resident Set Size for process (MB)

    < gpumem >
    - total      system RAM usage for GPU (MB/%)
    - size       per-process RAM usage for GPU (MB/%)

    < interdiff >
    - value      elapsed time between collections based on /proc/uptime (sec)

    < swap >
    - usage      swap usage for system (MB)
    - usagePer   swap usage for system (%)
    - usageDiff  swap usage diff for system (MB); positive = usage decreased, negative = usage increased
    - swapin     swap-in memory for system (MB)
    - swapout    swap-out memory for system (MB)
    - swap       swapped out memory for process (MB)

    < block >
    - ioWait     I/O wait time for system (%)
    - read       read size for system/process (MB); threshold comparison value supports size suffix (e.g. "500M")
    - write      write size for system/process (MB); threshold comparison value supports size suffix (e.g. "100M")
    - nrMajFlt   major page faults per monitoring interval (per-interval delta, page count)
    - nrRun      the number of runnable tasks
    - nrTask     the number of blocked tasks

    < storage >
    - usagePer   usage for system (%)
    - free       free space (MB)
    - favail     free inodes available for unprivileged users
    - readtime   read time (ms)
    - writetime  write time (ms)

    < net >
    - inbound    total RX traffic per interval (bytes); supports size suffix (e.g. "1G" = 1 GB)
    - outbound   total TX traffic per interval (bytes); supports size suffix (e.g. "1G" = 1 GB)
    - recv       RX bytes per device; threshold comparison value supports size suffix (e.g. "1G")
    - trans      TX bytes per device; threshold comparison value supports size suffix (e.g. "1G")

    < load >
    - load1m     loadavg for 1 Min
    - load5m     loadavg for 5 Min
    - load15m    loadavg for 15 Min

    < fd >
    - curFd      system-wide open file descriptor count (/proc/sys/fs/file-nr)
    - fdSize     open file descriptor count for process

    < sock >
    - nrTCPConn     TCP(ESTABLISHED) socket number for system
    - nrTCPRetrans  TCP retransmit count per tick for system
    - nrTCPRxQ      TCP receive queue size (bytes) for system; supports size suffix (e.g. "200M")
    - nrTCPSock     TCP socket number for system
    - nrTCPTxQ      TCP transmit queue size (bytes) for system; supports size suffix (e.g. "200M")
    - nrUDPRxQ      UDP receive queue size (bytes) for system; supports size suffix (e.g. "200M")
    - nrUDPSock     UDP socket number for system
    - nrUDPTxQ      UDP transmit queue size (bytes) for system; supports size suffix (e.g. "200M")
    - nrUDSSock     UDS number for system

    < file >
    - size       file size (bytes); supports size suffix (e.g. "1M")
    - count      file count in directory
    - exist      fire when file EXISTS (comp ignored; set "true")
    - none       fire when file is ABSENT (comp ignored; set "true")
    - data       file content as string; fires when content matches value (exact or regex if re:true)
    - dataInt    file content as integer; uses comp (big/less/eq) against numeric threshold
    - dataFloat  file content as float; uses comp (big/less/eq) against numeric threshold

    < task >
    - nrRun          the number of runnable tasks
    - nrCtx          context switches per monitoring interval (delta, not cumulative)
    - new            tasks created this monitoring interval (per-interval count)
    - die            tasks terminated this monitoring interval (per-interval count)
    - abnormal       the number of abnormal tasks
    - abnormalCond   condition status of abnormal tasks (ex, D/t/X/Z)
    - count          the number of total tasks

    < log >
    - filter     log filter; fnmatch wildcard pattern; use + to AND multiple patterns
                 e.g. "*critical*+*oops*" matches lines containing both "critical" and "oops"
                 when re:true, treated as a Python regex instead of fnmatch
    - path       target file or directory
    - inmount    monitor flag for the mount point of path (true/false)
    - allmount   monitor flag for all mount points (true/false)

    < func >
    - thread     target filter (task name or pattern)
    - filter     function/syscall/signal filter; use + to AND multiple patterns
                 e.g. "write*+read" matches entries matching both "write*" AND "read"
    - group      process grouping status (true/false)
    - main       target only main thread (true/false)

    < psi >
    - some-avg10    delay average for 10 seconds for at least one task (%)
    - some-avg60    delay average for 60 seconds for at least one task (%)
    - some-avg300   delay average for 300 seconds for at least one task (%)
    - some-diff     delay diff for at least one task (%)
    - full-avg10    delay average for 10 seconds for all tasks simultaneously (%)
    - full-avg60    delay average for 60 seconds for all tasks simultaneously (%)
    - full-avg300   delay average for 300 seconds for all tasks simultaneously (%)
    - full-diff     delay diff for all tasks simultaneously (%)

    < cgroup >
    - cpu          total CPU usage of groups (%)
    - throttle     total CPU throttle of groups (%)
    - memory       total memory usage of groups (MB)
    - read         total block read of groups (MB)
    - write        total block write of groups (MB)
    - cpuDelay     total cpu delay based on PSI(some) of groups (%)
    - memDelay     total mem delay based on PSI(some) of groups (%)
    - ioDelay      total io delay based on PSI(some) of groups (%)

    < peak >
    - maxTaskCpu    peak CPU usage of task (%)
    - maxTaskMem    peak memory usage of task (MB)
    - maxTaskBlk    peak block I/O size of task (MB)
    - maxTaskBlkRd  peak block read usage of task (MB)
    - maxTaskBlkWr  peak block write usage of task (MB)

    < pmu >
    - cycle           CPU cycles per monitoring interval (per-interval delta)
    - inst            CPU instructions per monitoring interval (per-interval delta)
    - ipc             instructions per cycle ratio (derived from per-interval cycle/inst)
    - cacheRef        cache references per monitoring interval (per-interval delta)
    - cacheMiss       cache misses per monitoring interval (per-interval delta)
    - cacheMissRate   cache miss rate (%)
    - branch          branch instructions per monitoring interval (per-interval delta)
    - branchMiss      branch misses per monitoring interval (per-interval delta)
    - branchMissRate  branch miss rate (%)
    - clock           CPU clock time per monitoring interval (sec, per-interval delta)
    - faultMin        minor page faults per monitoring interval (per-interval delta)
    - faultMaj        major page faults per monitoring interval (per-interval delta)

    < crash >
    - nrTickCrash    new crashes detected this monitoring interval (per-interval delta)
    - nrBootCrash    total crashes detected since guider started (cumulative sum of nrTickCrash)
    - nrTotalCrash   total crash files currently present on the system (absolute count)

    < anr >
    - nrTickANR    new ANRs detected this monitoring interval (per-interval delta)
    - nrBootANR    total ANRs detected since guider started (cumulative sum of nrTickANR)
    - nrTotalANR   total ANR files currently present on the system (absolute count)

    < battery >
    - per          remaining battery capacity (%)
    - left         remaining battery time; uses time string format (e.g. "30m", "1h", "90s")
    - plugged      power connection status (true/false)

    < time >
    - uptime       system uptime (sec)
    - runtime      task uptime since creation (sec)

    < sys >
    - bufferOver  monitoring buffer overflow flag (0: normal, 1: overflowed)
                  fires when procBuffer exceeds bufferSize; use oneshot+refresh to
                  save buffered data periodically while overflow persists

    < fifo >
    - write data written to the FIFO by any other process (stripped, up to maxsize bytes)
              the written string becomes the event name; use filter to limit accepted values
              the key is a logical name; use "path" field to set the actual FIFO path
              relative path is resolved against guider's tmpPath
              (Linux: /tmp, Android: /data/local/tmp)
    - path        actual filesystem path of the FIFO (default: key is used as the path)
    - autocreate  create the FIFO file automatically if it does not exist (default: true)
    - filter      fnmatch wildcard pattern to accept specific event names (default: *)
    - maxsize     maximum bytes to read per write (default: 64)

    < bpf >
    - eBPF-based kernel event threshold monitoring (requires Linux 5.4+, root)
    - metrics not available via /proc: scheduler latency, block I/O latency, function call counts
    - each subtype attaches BPF kprobe/tracepoint and polls BPF maps every monitoring interval
    - RUNQLAT   scheduler runqueue latency — time tasks wait before being scheduled
                available fields: p50, p99, maxlat (unit: ms); avg (per-process/thread mode only)
                uses sched_wakeup + sched_switch tracepoints; log2(ns) histogram
    - BLKLAT    block I/O request latency — time from issue to completion at block layer
                available fields: p99, maxlat (unit: ms)
                uses block_rq_issue + block_rq_complete tracepoints; Linux block layer only
    - FUNCCOUNT kernel function call count per monitoring interval
                available fields: func (kernel symbol name), count (call count threshold)
                uses kprobe entry; kfree_skb_reason preferred over kfree_skb (inlined on 5.17+)
    - FUNCLAT   kernel function call latency; measures entry-to-return time
                available fields: func (kernel symbol name), avg, p99, maxlat (unit: ms)
                uses kprobe entry + kretprobe; log2(ns) histogram
    - FUNCDATA  filtered function call counter — like FUNCCOUNT but with arg/ret conditions
                counts only calls where all specified conditions pass; uses kprobe (entry only
                when no ret conditions) or kprobe+kretprobe (when ret conditions are present)
                available fields: func (kernel symbol name), count (call count threshold),
                  arg1bt/lt/eq/ne .. arg5bt/lt/eq/ne  — arg1..5 condition (bt:>, lt:<, eq:==, ne:!=)
                  retbt/lt/reteq/retne               — return value condition (same operators)
                examples:
                  arg3bt:0        arg3 > 0  (fires when 3rd arg is positive)
                  retlt:0         ret < 0   (fires when function returned an error)
                  arg1eq:1000     arg1 == 1000
                multiple conditions are AND-ed; imm values must fit int32 (-2^31 .. 2^31-1)
    - p50        latency P50 threshold in ms (RUNQLAT only)
    - p99        latency P99 threshold in ms; fires when value exceeds threshold (RUNQLAT/BLKLAT/FUNCLAT)
    - maxlat    maximum latency threshold in ms (use "maxlat" not "max" to avoid conflict)
    - count     call count threshold per interval (FUNCCOUNT/FUNCDATA)
    - avg       average latency threshold in ms (FUNCLAT: all modes; RUNQLAT: per-process mode only)
    - func      kernel symbol name to attach kprobe (FUNCCOUNT/FUNCLAT/FUNCDATA)
    - process   process-level filter: COMM wildcard pattern or numeric PID ("" = disabled)
                when set, only counts/latency from matching processes contribute to threshold
                supported for FUNCCOUNT (count), FUNCLAT (avg), RUNQLAT (avg), FUNCDATA (count); not BLKLAT
    - thread    thread-level filter: thread COMM wildcard pattern or numeric TID ("" = disabled)
                AND-combined with process; both must match when both are set
    NOTE: BPF metrics are measured every interval; use oneshot+"refresh" to prevent
          repeated events while the condition persists (e.g. oneshot:true, refresh:6
          suppresses the event for 6 intervals then re-arms — 6s at default 1s interval,
          30s at 5s interval, 60s at 10s interval; adjust refresh per your -i setting)

- VARIABLE
    - EVTNAME     event name
    - EVTPID      task PID
    - EVTTIME     event time
    - EVTUPTIME   event uptime
    - EVTUTCTIME  event time (UTC)
    - NUMREP      report number
    - NUMRUN      run number
    - OUTDIR      last output dir
    - OUTPATH     last output path
    - PID         task PID (for top command)
    - SELFPID     Guider PID
    example: "command": ["GUIDER top -g EVTPID -o OUTDIR/EVTNAME_EVTTIME.out"]

- CORRELATION (event correlation groups)
    Defined as a top-level "correlation" key inside <threshold>.
    Fires extra commands when minMatch or more member events occur within the
    given time window — members may fire in different monitoring ticks.

    Comparison with multicond + condgroup:
      multicond+condgroup: all conditions must be true in the SAME tick;
                           individual events are suppressed and merged into
                           one synthetic group event reported as a single entry.
      correlation:         members fire independently across different ticks;
                           individual events are NOT suppressed or merged;
                           the group only dispatches its own extra commands;
                           supports partial match via minMatch.
    Note: window=1s + minMatch=<all members> approximates multicond behavior
    when the monitoring interval >= 1s, but individual events still fire.

    - <groupName>
        - apply      "true" to activate the group (default "false");
                     "APPLYALL" activates this group AND all other correlation groups at once
        - members    list of threshold event names to correlate
                     naming rule: <EVENT>_<ATTR>_<ITEM>[_<name>]
                       EVENT  = threshold type uppercased (e.g. CPU, MEM, IO, NETWORK)
                       ATTR   = scope value (SYSTEM, device name, task name, etc.)
                       ITEM   = attribute name (e.g. total, available, recv)
                       _name  = value of the optional "name" field in the condition
                     examples:
                       "CPU_SYSTEM_total"               cpu   → SYSTEM → total
                       "MEM_SYSTEM_available"           mem   → SYSTEM → available
                       "IO_SYSTEM_ioWait"               block → SYSTEM → ioWait
                       "NETWORK_eth0_recv"              net   → eth0   → recv
                       "STORAGE_sda1_usagePer"          storage → /dev/sda1 → usagePer
                       "SYS_SYSTEM_bufferOver"    sys   → SYSTEM → bufferOver
        - window     time window in seconds to check (default 5)
        - minMatch   minimum number of members that must fire within window (default 1)
        - commands   list of embedded commands to run when group activates
        - oneshot    "true" to disable the group after firing (default "false")
                     uses the same oneshot/refresh mechanism as threshold events
        - refresh    re-enable the group after N ticks (monitoring intervals);
                     requires oneshot "true" (default 0)

    Use CORR:<group>:<window> inside a threshold command to dynamically
    update the correlation window at runtime (see COMMAND section for details).

- COMMAND (embedded)
    - BUFFER:<size>                     resize the monitoring buffer; size supports suffix (K/M/G)
                                        e.g. "BUFFER:10M" = 10 MB
    - CLEAR                             clear the monitoring buffer (in-memory snapshots)
    - DISABLE{:<resource>}              disable a monitoring resource at runtime;
                                        valid: ALL, CPU, GPU, MEM, IRQ, DISK, NETWORK, BLOCK, PMU, LOG
    - ENABLE{:<resource>}               enable a monitoring resource at runtime; same resource names as DISABLE;
                                        BLOCK and PMU require root
    - EXIT                              terminate the entire Guider process (vs STOP which only halts threshold monitoring)
    - FILTER{:<item>}                   set the task display filter; items separated by | (pipe);
                                        e.g. "FILTER:systemd|kworker"; "FILTER:" (empty) clears the filter
    - INTERVAL:<sec>                    change the monitoring interval; accepts time strings (e.g. "5s", "1m", "2h");
                                        change is persistent until next INTERVAL command
    - JOBS                              print all active worker (event-handler) tasks to the monitoring log
    - KILL{:<pid>}                      send SIGKILL to worker tasks; omit pid to kill all workers;
                                        multiple pids: separated by # (e.g. "KILL:123#456")
    - OUTPATH:<path>                    change the output path (absolute or relative; resolved to realpath)
    - PAUSE{:<sec>}                     pause all monitoring and clear the buffer; sec must be an integer (not time string);
                                        omit sec for infinite pause (resumes only via ENABLE or restart)
    - RELOAD{:<path>}                   fully reload threshold config with event task restart;
                                        omit path to reload from the original config file at startup
    - RESET                             clear the accumulated monitoring statistics (not the buffer);
                                        resets cumulative counters, threshold history, and event counts
    - RESTART                           restart the Guider process
    - SAVE{:<duration>@<name>#<path>}   save the monitoring results to a file; all params optional:
                                        duration = positive: wait N seconds then save full buffer (e.g. "5s", "1m");
                                                   negative: save immediately, keeping only the most recent |N|
                                                   monitoring snapshots (e.g. "-60" keeps last 60 snapshots);
                                                   omit for immediate save of the full buffer
                                        name = output filename; path = output dir;
                                        multiple paths: separated by + (e.g. /tmp/+/data/)
    - SAVEMIN{:<duration>@<name>#<path>}
                                        save the monitoring results composed only of minimal data;
                                        same parameter format as SAVE
    - SAVERAW{:<duration>@<name>#<path>}
                                        save the monitoring results composed only of raw data;
                                        same parameter format as SAVE; multiple paths supported via +
    - SAVEBLOCK                         save current block usages
    - SAVECPU                           save current cpu usages
    - SAVEMEM                           save memory usages
    - SAVEMEMPROC                       save memory usages with smaps info
    - SAVEPID                           save PIDs
    - SAVEPRIO                          save priorities
    - SAVERUNTIME                       save runtimes
    - SAVESWAP                          save swap usages
    - SAVETOTALBLOCK                    save total block usages
    - SAVETOTALCPU                      save total cpu usages
    - SLEEP:<sec>                       sleep for N seconds (integer only; time strings like "5s" not accepted)
    - STOP                              stop threshold monitoring only (thrData cleared); process keeps running
                                        (vs EXIT which terminates the entire process)
    - TERM{:<pid>}                      send SIGINT to worker tasks; omit pid to terminate all workers;
                                        multiple pids: separated by # (e.g. "TERM:123#456")
    - UPDATE:<path>                     incrementally refresh threshold data from file without restarting event tasks
                                        (vs RELOAD which fully reinitializes with task restart); path is required
    - NOTIFY:<item>                     manually trigger a threshold event; item format: "<group>_<name>{_<target>}"
                                        e.g. "NOTIFY:log_cpu" triggers the "cpu" entry in the "log" group
    - GETDUMP{:<size>}                  dump recent monitoring data to a remote client;
                                        size = negative seconds offset (e.g. -60 = last 60s of data)
    - GETINFO                           return current threshold configuration as diagnostic info
    - ENABLETHR:<name>                  enable all threshold entries tagged with tgroup:<name>
                                        (sets apply:true at runtime; for BPF entries, preload:true is required
                                        to have the kprobe pre-attached before ENABLETHR fires)
    - DISABLETHR:<name>                 disable all threshold entries tagged with tgroup:<name>
                                        (sets apply:false at runtime; BPF kprobe remains attached if preloaded)
    - ASKAI{:<prompt>#<opts>}           ask LLM to analyze the current event (analysis only)
                                        TIMEOUT:<s>      LLM API call timeout in seconds
                                        DRYRUN:<bool>    log the response without any side effects
                                        CTXDEPTH:<n>     number of prior event contexts to attach
                                        PROVIDER:<name>  LLM provider (claude/openai/gemini/custom-*)
                                        MODEL:<name>     model name override for this call
                                        APIKEY:<key>     API key override for this call
                                        BASEURL:<url>    custom API base URL override
    - ASKRUN{:<prompt>#<opts>}          ask LLM to analyze and auto-execute safe commands
                                        TIMEOUT:<s>      LLM API call timeout in seconds
                                        DRYRUN:<bool>    show suggested commands without executing
                                        MAXCMD:<n>       max number of commands to auto-execute
                                        CTXDEPTH:<n>     number of prior event contexts to attach
                                        PROVIDER:<name>  LLM provider (claude/openai/gemini/custom-*)
                                        MODEL:<name>     model name override for this call
                                        FEEDBACK:<s>     re-query AI after N seconds with execution results
                                        APIKEY:<key>     API key override for this call
                                        BASEURL:<url>    custom API base URL override
    - ASKMULTI{:<prompt>#PROVIDERS:<p1>:<p2>}  query multiple LLM providers in parallel
                                        providers: claude, openai, gemini,
                                                   custom-claude, custom-openai, custom-gemini
    - (global -q opts for ASKAI/ASKRUN/ASKMULTI):
                                        LLMRATELIMIT:<s>         min interval between AI calls (default: 60s)
                                        LLMDRYRUN:<bool>         dry-run mode — show commands without executing
                                        LLMMAXCMD:<n>            max commands ASKRUN may execute
                                        LLMCTXDEPTH:<n>          number of prior event contexts to include
                                        LLMAUDITLOG:<path>       append each AI interaction to a log file
                                        LLMALLOWCMD:<cmd1:cmd2>  extra commands ASKRUN is allowed to run
    - WEBHOOK:<url>{#<key>:<val>,...}   POST JSON event snapshot to external endpoint
    - SNAPSHOT{:<label>}                save system snapshot JSON to the output directory
    - CORR:<group>:<window>             set event correlation window (seconds) for a group at runtime
    - AUTOSCHED:<policy>:<pri>           change CPU scheduling policy of governor targets;
                                        policy: C(CFS) F(FIFO) R(RR) B(BATCH) I(IDLE); pri: 0 for I/B/C, 1-99 for F/R;
                                        original (policy, param) saved in govState["scheds"] for AUTORESTORE
    - AUTOIONICE:<class>:<pri>          change I/O scheduling class of governor targets;
                                        class: idle / be / rt (or IOPRIO_CLASS_IDLE etc.); pri: 0-7;
                                        original (ioclass, pri) saved in govState["ionices"] for AUTORESTORE
    - AUTOOMADJ:<score>                 change /proc/pid/oom_score_adj of governor targets (-1000~1000);
                                        1000 = OOM kill first; -1000 = never OOM kill;
                                        original score saved in govState["oomadjs"] for AUTORESTORE
    - AUTOSIGNAL:<signal>               send a signal to governor targets (e.g. SIGSTOP SIGTERM SIGKILL);
                                        SIGSTOP freezes the process; pids saved in govState["frozen"];
                                        AUTORESTORE sends SIGCONT to all frozen pids
    - AUTONICE:<delta>                  increase the nice value of governor target process(es) by delta;
                                        targets are determined by autoTarget (default "topCpu");
                                        excludeList processes are skipped; original values are saved
                                        for AUTORESTORE; positive delta = lower priority
    - AUTOLIMITCPU:<pct>                limit CPU usage of governor targets to pct% via cgroup;
                                        uses processes already tracked by AUTONICE if available,
                                        otherwise re-selects via autoTarget; kills any prior
                                        limitcpu subprocesses before applying new limits
    - AUTORESTORE                       restore all governor state: sched/ionice/oomadj/frozen/nice/limitcpu;
                                        auto-injected into lcommand when restoreOnClear is "true"

- STARTCOND / EXITCOND (lifecycle)
    NOTE: these are -q command-line options, not JSON config keys
          e.g. guider ctop -q STARTCONDPSICPU:20,STARTCONDLOAD:4 -R 60
    - STARTCONDPSICPU:<pct>     start monitoring when PSI cpu.some.avg10 >= pct
    - STARTCONDPSIMEM:<pct>     start monitoring when PSI memory.some.avg10 >= pct
    - STARTCONDPSIIO:<pct>      start monitoring when PSI io.some.avg10 >= pct
    - STARTCONDLOAD:<load>      start monitoring when 1m load average >= load
    - STARTCONDGPU:<pct>        start monitoring when GPU load >= pct
    - EXITCONDPSICPU:<pct>      stop monitoring when PSI cpu.some.avg10 >= pct
    - EXITCONDPSIMEM:<pct>      stop monitoring when PSI memory.some.avg10 >= pct
    - EXITCONDPSIIO:<pct>       stop monitoring when PSI io.some.avg10 >= pct
    - EXITCONDLOAD:<load>       stop monitoring when 1m load average >= load
    - EXITCONDGPU:<pct>         stop monitoring when GPU load >= pct

- PRINTCOND (output filter)
    NOTE: these are -q command-line options, not JSON config keys
    - PSICPUCOND:<pct>          print only when PSI cpu.some.avg10 >= pct
    - LOADCOND:<load>           print only when 1m load average >= load
    - GPUCOND:<pct>             print only when GPU load >= pct

- CHARACTER
    - #   ignore a line (also valid inside JSON blocks to comment out a field)
    - ''' ignore specific range

- ASKAI / ASKRUN  (LLM-driven event analysis)

  Command syntax:
    ASKAI:<PROMPT>[#TIMEOUT:<s>,CTXDEPTH:<n>,PROVIDER:<p>,MODEL:<m>]
    ASKRUN:<PROMPT>[#TIMEOUT:<s>,DRYRUN:<bool>,MAXCMD:<n>,CTXDEPTH:<n>,
                    PROVIDER:<p>,MODEL:<m>,FEEDBACK:<s>]

  Execution flow:
    1. Threshold fires  ->  handleEventCmd() dispatches ASKAI or ASKRUN
    2. Inline opts parsed (TIMEOUT / DRYRUN / MAXCMD / CTXDEPTH / PROVIDER / MODEL)
       Global -q opts applied as fallback defaults:
         LLMRATELIMIT:<s>        minimum seconds between LLM calls per event
         LLMDRYRUN:<bool>        force dry-run mode globally
         LLMMAXCMD:<n>           global cap on commands ASKRUN may execute
         LLMCTXDEPTH:<n>         number of top processes included in context
         LLMAUDITLOG:<path>      append JSONL audit record after each call
         LLMALLOWCMD:<CMD1:CMD2> extra commands to whitelist beyond defaults
         ALLOWRUN                permit RUN / KILL / TERM commands
    3. Rate-limit check  (default 60 s per event; inline TIMEOUT sets API timeout,
                          not the rate window — use LLMRATELIMIT for the window)
    4. Duplicate-call guard: only one pending LLM request per event at a time
    5. Daemon thread launched  (non-blocking; monitor loop continues normally)
    6. System context collected inside the thread:
         event         name / uptime / timestamp / threshold details
         system        SysMgr.sysSnapshot() — CPU / MEM / IO summary
         top_processes SysMgr.topProcs(ctxDepth)
         metric_history last 5 ticks of intervalData time-series
         recent_events  correlated events within the last historyWindow ticks
         os_info        kernel version / architecture
         network_info   TCP and UDP socket counts
         extended       extra fields from guider.conf [llm] CONTEXT section
    7. Provider resolved  (priority order):
         inline PROVIDER opt  >  -q LLMPROVIDER  >  guider.conf [llm] provider
         >  LLM_PROVIDER env  >  auto-detect from installed packages
       Model resolved (same priority chain with LLMMODEL / LLM_MODEL)
    8. LLM instance obtained from _instances cache (keyed by provider + kwargs)
       ASKRUN: _ASKRUN_SYSTEM_PROMPT injected via setCacheSystemPrompt()
               delivered as system= parameter in both streaming and non-streaming
               API calls (only when enableCache=False, which is the default)
    9. API call result handling:
         ASKAI  ->  response printed as  [LLM:ASKAI] <text>
         ASKRUN ->  response JSON parsed:
                      severity routing adjusts maxCmd and dryRun if not explicit
                        critical -> maxCmd=5
                        high     -> maxCmd=3
                        medium   -> maxCmd=1, dryRun=True
                        low      -> maxCmd=0, dryRun=True
                      AUTO_ESCALATE rules from guider.conf [llm] ASKRUN section
                      command whitelist check per entry
                      dryRun=true  -> [LLM:DRYRUN] would execute: <cmd>
                      dryRun=false -> [LLM:EXEC]   executing: <cmd>
                                      handleEventCmd(cmd) called recursively
                      blocked cmd  -> [LLM:BLOCKED] command not allowed: <cmd>
                      parse fail   -> warning printed, no commands run
   10. Feedback loop (ASKRUN + FEEDBACK:<s> + non-dry-run only):
         sleep FEEDBACK seconds, re-collect context, second API call
         result printed as  [LLM:FEEDBACK] <text>
   11. Audit log entry written to LLMAUDITLOG file (JSONL, one line per call):
         { ts, event, askType, dryrun, cmds_executed, cmds_blocked,
           severity*, subsystems*, confidence*, analysis* }
         (* ASKRUN fields, present only when JSON was parsed successfully)
   12. Pending flag cleared  ->  next threshold event may trigger again

  ASKRUN response JSON schema (LLM must return exactly this structure):
    {
      "analysis"  : string  -- root-cause explanation (2-3 sentences)
      "severity"  : string  -- one of: low | medium | high | critical
      "subsystems": array   -- e.g. ["cpu","sched"]
      "confidence": number  -- evidence quality 0.0 - 1.0
      "commands"  : array   -- remediation commands (empty array if none)
      "rationale" : string  -- why these commands were chosen
    }

  Command whitelist — 39 commands always permitted for ASKRUN execution:
    SAVE  SAVERAW  SAVEMIN  SAVECPU  SAVETOTALCPU  SAVEMEM  SAVEMEMPROC
    SAVEBLOCK  SAVETOTALBLOCK  SAVEPID  SAVERUNTIME  SAVEPRIO  SAVESWAP
    GETDUMP  GETSUM  GETINFO  RESET  CLEAR  PAUSE  SLEEP  DISABLE  ENABLE
    FILTER  NOTIFY  BUFFER  INTERVAL  JOBS  WEBHOOK  SNAPSHOT  CORR  ASKMULTI
    AUTOSCHED  AUTOIONICE  AUTOOMADJ  AUTOSIGNAL  AUTONICE  AUTOLIMITCPU
    AUTORESTORE  AUTOSWAPOUT

  Command blocklist — always rejected regardless of DRYRUN or ALLOWRUN:
    EXIT  RESTART  RELOAD  UPDATE  STOP
'''

