                 "F50" (FIFO prio 50), "N10" (NICE +10); comp applies to the numeric part
    - nrCore     number of online CPU cores

    < core >
    - total      total CPU usage (%)
    - idle       total CPU idle (%)
    - user       user CPU usage (%)
    - kernel     kernel CPU usage (%)
    - irq        irq CPU usage (%)
    - iowait     iowait time (%)
    - steal      steal time (%)
