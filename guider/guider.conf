# Guider Configuration

'''
[ Threshold Description ]

- TARGET
    - anr        nrTickANR, nrBootANR, nrTotalANR
    - battery    per, left, plugged
    - block      ioWait, read, write, nrMajFlt, nrRun, nrTask
    - cgroup     cpu, throttle, memory, read, write, cpuDelay, memDelay, ioDelay
    - core       total, idle, user, kernel, irq, iowait, steal, temp, online
                 curFreq, minFreq, maxFreq, governor
    - cpu        total, idle, user, kernel, irq, iowait, nrCore, steal, temp, pri
    - crash      nrTickCrash, nrBootCrash, nrTotalCrash
    - fd         curFd, fdSize
    - file       exist, none, size, count, data, dataInt, dataFloat
    - func       native, syscall, python, D-Bus, signal
    - gpu        total
    - gpumem     total, size
    - interdiff  value
    - load       load1m, load5m, load15m
    - log        DLT, kernel, journal, syslog, trace, android, file
    - mem        available, free, anon, file, slab, cache, kernel, freeDiff
                 availableDiff, anonDiff, fileDiff, slabDiff, pgDirty, pgRclmBg
                 pgRclmFg, nrMinFlt, pgMlock, oomKill, nrTickLmk, nrBootLmk,
                 nrTotalLmk, nrTickLmkFg, nrBootLmkFg, nrTotalLmkFg,
                 nrTickLmkBg, nrBootLmkBg, nrTotalLmkBg, cmaFree, cmaDev, rss
    - net        inbound, outbound, recv, trans
    - peak       maxTaskCpu, maxTaskMem, maxTaskBlk, maxTaskBlkRd, maxTaskBlkWr
    - pmu        cycle, inst, ipc, cacheRef, cacheMiss, cacheMissRate, branch
                 branchMiss, branchMissRate, clock, faultMin, faultMaj
    - psi        cpu, memory, io
    - sock       nrUDPSock, nrUDPTxQ, nrUDPRxQ, nrTCPSock, nrTCPConn, nrTCPTxQ
                 nrTCPRxQ, nrTCPRetrans, nrUDSSock
    - storage    usagePer, free, favail, readtime, writetime
    - swap       usage, usagePer, usageDiff, swapin, swapout, swap
    - sys        bufferOver
    - fifo       write data from other processes becomes event name
    - task       nrRun, nrCtx, new, die, abnormal, abnormalCond, count
    - time       uptime, runtime

- SCOPE
    - SYSTEM     system resources
    - *NAME/ID   NAME/ID for specific tasks, devices, events (support regex)
    - ANDROID    android log
    - DLT        DLT log
    - FILE       file access log
    - JOURNAL    systemd journal log
    - KERNEL     kernel log
    - SYSLOG     syslog log
    - TRACE      ftrace log
    - DBUS       D-Bus message
    - NATIVE     native function for C, C++, Rust, Go
    - PYTHON     python function
    - SIGNAL     signal
    - SYSCALL    syscall
    - cpu        PSI cpu resource type (for psi section)
    - memory     PSI memory resource type (for psi section)
    - io         PSI io resource type (for psi section)

- VALUE FORMAT
    - Boolean          use string "true"/"false" (JSON true/false is NOT accepted)
    - Size suffix      K=KB, M=MB, G=GB (case-insensitive); e.g. "500K", "200M", "1G"
                       applicable to threshold comparison values such as net inbound/outbound,
                       block read/write, mem available, etc.
    - interval         integer tick count (NOT seconds); e.g. interval:5 = 5 ticks
                       (contrast: after/before/duration use "60s"/"5m"/"1h" string format)
    - comp             big: >= (greater than or equal); fires when measured >= threshold
                       less: <= (less than or equal); fires when measured <= threshold
                       eq: == (equal; exact match only)

- ATTRIBUTE
    NOTE: "tick" = 1 monitoring interval (set by -i option, default 1s).
          e.g. refresh:10 means 10s at default interval, 50s at -i 5, 100s at -i 10

    < common >
    - after            fire only when system uptime >= value (e.g. "60s", "5m", "1h")
    - apply            activation flag (true/false)
    - preload          (BPF entries only) initialize BPF program at startup even when apply is false;
                       enables ENABLETHR to activate the entry at runtime without re-attaching kprobes;
                       the kprobe/tracepoint is always live; data collection starts only when apply is true
    - tgroup           threshold group name; entries with the same tgroup can be bulk-enabled or
                       disabled at runtime via ENABLETHR:<name> / DISABLETHR:<name> commands;
                       entries survive startup pruning (apply:false is preserved in memory)
    - autoTarget       process selection strategy for the adaptive governor commands
                       (AUTOSCHED / AUTOIONICE / AUTOOMADJ / AUTOSIGNAL / AUTONICE / AUTOLIMITCPU / AUTORESTORE); supported values:
                         topCpu   — top CPU consumers (default)
                         topRss   — top RSS (resident memory) consumers
                         topBlkRd — top block read consumers
                         topBlkWr — top block write consumers
    - before           fire only when system uptime <= value; combine with after for a boot window
    - caution          caution message (string)
    - command          command set for handling the started event; accepts a list of strings;
                       each string can be: an embedded command (see COMMAND section), a CMD_* shortcut
                       defined in the COMMAND block, or a shell command string; VARIABLE substitution applies
    - comp             compare operation: big(>=), less(<=), eq(==)
    - condgroup        group name for multicond events
                       All conditions sharing the same condgroup must be true in the
                       same monitoring tick to fire a single synthetic group event.
                       (For cross-tick, time-window-based grouping see CORRELATION)
    - daemon           daemon flag (true/false); when true, the command task runs untracked
                       (not registered in guider's worker list); when false (default), it is
                       tracked and can be managed via KILL/TERM/JOBS commands
    - dumpfile         list of file paths to embed in the report when the event fires;
                       each entry: "path" (full file) or "path#N" (first N bytes) or "path#-N" (last N bytes)
                       (e.g. ["/proc/cmdline", "/var/log/messages#1000"]); included as plain text
    - dumpfileb64      same as dumpfile but files are embedded as base64-encoded content
    - escalation       ordered list of {"action": "CMD"} entries; each successive fire (after oneshot
                       re-arms via refresh) executes the next action in the list, advancing one step
                       per fire (e.g. [{"action":"AUTONICE:+10"},{"action":"AUTOLIMITCPU:70"}]
                       → 1st fire: AUTONICE, 2nd fire: AUTOLIMITCPU; stops at last step)
    - exceptAND        task AND filter for exclusion from threshold matching
                       (filters which tasks/devices are evaluated — unrelated to AUTO* governor targeting)
    - exceptOR         task OR filter for exclusion from threshold matching
                       (filters which tasks/devices are evaluated — unrelated to AUTO* governor targeting)
    - explain          description (string)
    - goneshot         global oneshot flag (true/false);
                       when this entry fires, ALL threshold monitoring is completely disabled
                       (SysMgr.thrData is cleared entirely — not just this entry or this type);
                       use when you want to permanently stop monitoring after the first critical event
    - includeAND       task AND filter for inclusion (whitelist); only tasks matching ALL patterns
                       are evaluated; opposite of exceptAND
    - includeOR        task OR filter for inclusion (whitelist); only tasks matching ANY pattern
                       are evaluated; opposite of exceptOR
    - interval         duration condition value (tick); used with type for statistical check
    - lcommand         command set for handling the finished event (when condition clears);
                       same format as command; fired when the metric drops below the threshold
    - lock             global lock flag (true/false); when true, no other threshold event may fire
                       until this entry's command completes; prevents concurrent heavy commands
    - max              maximum number of times this event may fire; decrements each trigger;
                       disables the entry when count reaches 0 (omit or -1 = unlimited)
    - message          event message (string)
    - multicond        multiple condition flag (true/false);
                       requires condgroup to be set; all entries sharing the same condgroup
                       must all be true in the same tick to fire a synthetic group event
    - name             additional event name
    - oneshot          only one-time event handling flag (true/false);
                       fires once globally — disabled regardless of which target triggered it
    - oneshotNAME      one-time per target NAME (device/process name); fires once per unique name;
                       different targets (e.g. different processes) each get their own counter
    - oneshotPID       one-time per target PID; re-arms when the same process restarts with a new PID
    - perm             permission requirement; "root" (lowercase) = requires root; omit = no requirement
    - predict          predictive anomaly horizon; fire command before threshold is reached
                       (e.g. "3m", "30s"); fires only on rising trends (slope > 0)
                       and only while the current value is still below the threshold
    - predictMin       minimum history duration required before a prediction fires (e.g. "30s")
    - prop             android system property condition; format: "name[|value[|match]]"
                       name only: fire when property is set; name|value: fire when prop==value;
                       name|value|false: fire when prop!=value (inverted match)
                       e.g. "sys.boot_completed|1" fires when boot finishes
    - rafter           fire only when guider runtime >= value (time string: "30s", "5m", "1h")
    - rbefore          fire only when guider runtime <= value (same format as rafter)
    - re               regex filter flag for logs (true/false)
    - refresh          restart timer for items disabled by oneshot flag (tick)
    - restoreOnClear   auto-inject AUTORESTORE into lcommand when the event condition ends (true/false)
    - signal           send signal to the command task after N ticks; format: "<tick>{:<SIGNAL>}"
                       default signal is SIGINT; example: "5:SIGTERM" sends SIGTERM after 5 intervals
    - skip             number of monitoring ticks to skip event checking after the event fires
    - taskmon          task monitoring flag (true/false); when true, includes per-task breakdown
                       in the saved output (which tasks are consuming the resource)
    - type             duration condition type (avg/min/max); requires interval
                       avg: average of last N ticks (default when type is omitted)
                       min: minimum of last N ticks
                       max: maximum of last N ticks
    - excludeList      list of process names excluded from AUTO* governor target selection
                       (applies to AUTONICE, AUTOLIMITCPU, etc.; unrelated to exceptOR/exceptAND)
                       (e.g. ["systemd", "guider", "init"])
    - targetList       list of process names to exclusively target; if non-empty,
                       only processes whose comm matches are selected (e.g. ["chrome", "app"])

    < cpu >
    - total      total CPU usage for system/process/thread (%)
    - idle       total CPU idle for system (%)
    - user       user CPU usage for system (%)
    - kernel     kernel CPU usage for system (%)
    - irq        irq CPU usage for system (%)
