# Guider Configuration

'''
[ Threshold Description ]

- TARGET
    - anr:       nrTickANR, nrBootANR, nrTotalANR
    - battery:   per, left, plugged
    - block:     ioWait, read, write, nrMajFlt, nrRun, nrTask
    - cgroup:    cpu, throttle, memory, read, write, cpuDelay, memDelay, ioDelay
    - core:      total, idle, user, kernel, irq, iowait, steal, temp, online
                 curFreq, minFreq, maxFreq, governor
    - cpu:       total, idle, user, kernel, irq, iowait, nrCore, steal, temp, pri
    - crash:     nrTickCrash, nrBootCrash, nrTotalCrash
    - fd:        curFd, fdSize
    - file:      exist, none, size, count, data, dataInt, dataFloat
    - func:      native, syscall, python, D-Bus, signal
    - gpu:       total
    - gpumem:    total, size
    - load:      load1m, load5m, load15m
    - log:       DLT, kernel, journal, syslog, trace, android, file
    - mem:       available, free, anon, file, slab, cache, kernel, freeDiff
                 availableDiff, anonDiff, fileDiff, slabDiff, pgDirty, pgRclmBg
                 pgRclmFg, nrMinFlt, pgMlock, oomKill, cmaFree, cmaDev, rss
    - net:       inbound, outbound, recv, trans
    - peak:      maxTaskCpu, maxTaskMem, maxTaskBlk, maxTaskBlkRd, maxTaskBlkWr
    - pmu:       cycle, inst, ipc, cacheRef, cacheMiss, cacheMissRate, branch
                 branchMiss, branchMissRate, clock, faultMin, faultMaj
    - psi:       cpu, memory, io
    - sock:      nrUDPSock, nrUDPTxQ, nrUDPRxQ, nrTCPSock, nrTCPConn, nrTCPTxQ
                 nrTCPRxQ, nrTCPRetrans, nrUDSSock
    - storage:   usagePer, free, favail, readtime, writetime
    - swap:      usage, usagePer, usageDiff, swapin, swapout
    - task:      nrRun, nrCtx, new, die, abnormal, abnormalCond, count
    - time:      uptime, runtime

- SCOPE
    - SYSTEM:    system resources
    - *NAME/ID:  NAME/ID for specific tasks, devices, events (support regex)
    - ANDROID:   android log
    - DLT:       DLT log
    - FILE:      file access log
    - JOURNAL:   systemd journal log
    - KERNEL:    kernel log
    - SYSLOG:    syslog log
    - TRACE:     ftrace log
    - DBUS:      D-Bus message
    - NATIVE:    native function for C, C++, Rust, Go
    - PYTHON:    python function
    - SIGNAL:    signal
    - SYSCALL:   syscall

- ATTRIBUTE
    < common >
    - after:         fire only when uptime >= value (e.g. "60s", "5m", "1h")
    - apply:         activation flag (true/false)
    - before:        fire only when uptime <= value; combine with after for a boot window
    - caution:       caution message (string)
    - command:       command set for handling the started event
    - comp:          compare operation (big, less, eq)
    - condgroup:     group name for multicond events
                     All conditions sharing the same condgroup must be true in the
                     same monitoring tick to fire a single synthetic group event.
                     (For cross-tick, time-window-based grouping see CORRELATION)
    - daemon:        daemon flag for command task (true/false)
    - dumpfile:      file dump list for the report file
    - dumpfileb64:   file dump list base64-encoded for the report file
    - exceptAND:     task AND filter for exclusion
    - exceptOR:      task OR filter for exclusion
    - explain:       description (string)
    - goneshot:      global oneshot flag (true/false)
    - includeAND:    task AND filter for inclusion
    - includeOR:     task OR filter for inclusion
    - interval:      duration condition value (tick); used with type for statistical check
    - lcommand:      command set for handling the finished event
    - lock:          global lock flag to handle the event exclusively (true/false)
    - max:           maximum event count (tick)
    - message:       event message (string)
    - multicond:     multiple condition flag (true/false)
    - name:          additional event name
    - oneshot:       only one-time event handling flag (true/false)
    - oneshotPID:    only one-time event handling flag for same target PID (true/false)
    - oneshotNAME:   only one-time event handling flag for same target NAME (true/false)
    - perm:          permission requirement (root)
    - prop:          android system property condition (name{|value|true/false})
    - rafter:        fire only when guider runtime >= value
    - rbefore:       fire only when guider runtime <= value
    - re:            regex filter flag for logs (true/false)
    - refresh:       restart timer for items disabled by oneshot flag (tick)
    - signal:        signal timer for command task (tick{:SIGNAL})
    - skip:          global skip count (tick)
    - taskmon:       task monitoring flag (true/false)
    - type:          duration condition type (avg/min/max); requires interval
                     avg: average of last N ticks (default when type is omitted)
                     min: minimum of last N ticks
                     max: maximum of last N ticks

    < cpu >
    - total:     total CPU usage for system/process/thread (%)
    - idle:      total CPU idle for system (%)
    - user:      user CPU usage for system (%)
    - kernel:    kernel CPU usage for system (%)
    - irq:       irq CPU usage for system (%)
    - iowait:    iowait time for system (%)
    - steal:     steal time for system (%)
    - temp:      temperature average for system
    - pri:       priority for thread

    < core >
    - total:     total CPU usage (%)
    - idle:      total CPU idle (%)
    - user:      user CPU usage (%)
    - kernel:    kernel CPU usage (%)
    - irq:       irq CPU usage (%)
    - iowait:    iowait time (%)
    - steal:     steal time (%)
    - temp:      temperature
    - online:    online status (true/false)
    - curFreq:   current frequency
    - minFreq:   minimum frequency
    - maxFreq:   maximum frequency
    - governor:  governor

    < gpu >
    - total:     total GPU usage for system (%)

    < mem >
    - available:       available memory for system (MB/%)
    - free:            free memory for system (MB/%)
    - anon:            anonymous memory for system (MB/%)
    - file:            file cache for system (MB/%)
    - slab:            slab cache for system (MB/%)
    - cache:           total cache for system (MB/%)
    - kernel:          kernel memory for system (MB/%)
    - freeDiff:        free memory diff for system (MB/%)
    - availableDiff:   available memory diff for system (MB/%)
    - anonDiff:        anonymous memory diff for system (MB/%)
    - fileDiff:        file cache diff for system (MB/%)
    - slabDiff:        slabcache diff for system (MB/%)
    - pgDirty:         dirty page for system (PAGE)
    - pgRclmBg:        background reclaimed memory for system (PAGE)
    - pgRclmFg:        foreground reclaimed memory for system (PAGE)
    - nrMinFlt:        minor fault for system (PAGE)
    - pgMlock:         page lock for system (PAGE)
    - oomKill:         OOM kill count
    - cmaFree:         cma free memory (MB/%)
    - cmaDev:          cma device memory (MB/%)
    - rss:             Resident Set Size for process (MB/%)

    < gpumem >
    - total:     system RAM usage for GPU (MB/%)
    - size:      per-process RAM usage for GPU (MB/%)

    < swap >
    - usage:     swap usage for system (MB)
    - usagePer:  swap usage for system (%)
    - usageDiff: swap usage diff for system (MB)
    - swapin:    swap-in memory for process (MB)
    - swapout:   swap-out memory for process (MB)
    - swap:      swapped out memory for process (MB)

    < block >
    - ioWait:    I/O wait time for system (%)
    - read:      read size for system/process (MB)
    - write:     write size for system/process (MB)
    - nrMajFlt:  the number of major faults for system
    - nrRun:     the number of runnable tasks
    - nrTask:    the number of blocked tasks

    < storage >
    - usagePer:  usage for system (%)
    - free:      free space (MB)
    - favail:    file number can be created
    - readtime:  read time (ms)
    - writetime: write time (ms)

    < net >
    - inbound:   RX size for system
    - outbound:  TX size for system
    - recv:      RX size for devices
    - trans:     TX size for devices

    < load >
    - load1m:    loadavg for 1 Min
    - load5m:    loadavg for 5 Min
    - load15m:   loadavg for 15 Min

    < fd >
    - curFd:     file handle number for system
    - fdSize:    file descriptor number for process

    < sock >
    - nrUDPSock: UDP socket number for system
    - nrUDPTxQ:  UDP transmit queue bytes for system
    - nrUDPRxQ:  UDP receive queue bytes for system
    - nrTCPSock: TCP socket number for system
    - nrTCPConn: TCP(ESTABLISHED) socket number for system
    - nrTCPTxQ:  TCP transmit queue bytes for system
    - nrTCPRxQ:     TCP receive queue bytes for system
    - nrTCPRetrans: TCP retransmit count per tick for system
    - nrUDSSock:    UDS number for system

    < file >
    - size:      file size
    - count:     file count in directory
    - exist:     file status (true/false)
    - none:      file status (true/false)
    - data:      file data
    - dataInt:   file data of type int
    - dataFloat: file data of type float

    < task >
    - nrRun:         the number of runnable tasks
    - nrCtx:         the number of context switching for system/thread
    - new:           the number of created tasks
    - die:           the number of terminated tasks
    - abnormal:      the number of abnormal tasks
    - abnormalCond:  condition status of abnormal tasks (ex, D/t/X/Z)
    - count:         the number of total tasks

    < log >
    - filter:    log filter
    - path:      target file or directory
    - inmount:   monitor flag for the mount point of path (true/false)
    - allmount:  monitor flag for all mount points (true/false)

    < func >
    - thread:    target filter
    - filter:    function filter
    - group:     process grouping status (true/false)
    - main:      target only main thread (true/false)

    < psi >
    - some-avg10:   delay average for 10 seconds for at least one task (%)
    - some-avg60:   delay average for 60 seconds for at least one task (%)
    - some-avg300:  delay average for 300 seconds for at least one task (%)
    - some-diff:    delay diff for at least one task (%)
    - full-avg10:   delay average for 10 seconds for all tasks simultaneously (%)
    - full-avg60:   delay average for 60 seconds for all tasks simultaneously (%)
    - full-avg300:  delay average for 300 seconds for all tasks simultaneously (%)
    - full-diff:    delay diff for all tasks simultaneously (%)

    < cgroup >
    - cpu:         total CPU usage of groups (%)
    - throttle:    total CPU throttle of groups (%)
    - memory:      total memory usage of groups (MB)
    - read:        total block read of groups (MB)
    - write:       total block write of groups (MB)
    - cpuDelay:    total cpu delay based on PSI(some) of groups (%)
    - memDelay:    total mem delay based on PSI(some) of groups (%)
    - ioDelay:     total io delay based on PSI(some) of groups (%)

    < peak >
    - maxTaskCpu:   peak CPU usage of task (%)
    - maxTaskMem:   peak memory usage of task (MB)
    - maxTaskBlk:   peak blocked time of task (%)
    - maxTaskBlkRd: peak block read usage of task (MB)
    - maxTaskBlkWr: peak block write usage of task (MB)

    < pmu >
    - cycle:          CPU cycle
    - inst:           CPU instruction
    - ipc:            instruction per cycle (%)
    - cacheRef:       cache reference
    - cacheMiss:      cache miss
    - cacheMissRate:  cache miss rate (%)
    - branch:         branch
    - branchMiss:     branch miss
    - branchMissRate: branch miss rate (%)
    - clock:          clock time (sec)
    - faultMin:       minor fault
    - faultMaj:       major fault

    < crash >
    - nrTickCrash:   new crash in a tick
    - nrBootCrash:   new crash since boot
    - nrTotalCrash:  a total of crash

    < anr >
    - nrTickANR:   new ANR in a tick
    - nrBootANR:   new ANR since boot
    - nrTotalANR:  a total of ANR

    < battery >
    - per:         remaining battery capacity (%)
    - left:        remaining battery time
    - plugged:     power connection status (true/false)

    < time >
    - uptime:      uptime for system
    - runtime:     uptime for task

- VARIABLE
    - EVTNAME:    event name
    - EVTPID:     task PID
    - EVTTIME:    event time
    - EVTUPTIME:  event uptime
    - EVTUTCTIME: event time (UTC)
    - NUMREP:     report number
    - NUMRUN:     run number
    - OUTDIR:     last output dir
    - OUTPATH:    last output path
    - PID:        task PID (for top command)
    - SELFPID:    Guider PID

- CORRELATION (event correlation groups)
    Defined as a top-level "correlation" key inside <threshold>.
    Fires extra commands when minMatch or more member events occur within the
    given time window — members may fire in different monitoring ticks.

    Comparison with multicond + condgroup:
      multicond+condgroup: all conditions must be true in the SAME tick;
                           individual events are suppressed and merged into
                           one synthetic group event reported as a single entry.
      correlation:         members fire independently across different ticks;
                           individual events are NOT suppressed or merged;
                           the group only dispatches its own extra commands;
                           supports partial match via minMatch.
    Note: window=1s + minMatch=<all members> approximates multicond behavior
    when the monitoring interval >= 1s, but individual events still fire.

    - <group_name>:
        - apply:     "true" to activate the group (default "false"; supports APPLYALL)
        - members:   list of threshold event names to correlate
                     naming rule: <EVENT>_<ATTR>_<ITEM>[_<name>]
                       EVENT  = threshold type uppercased (e.g. CPU, MEM, IO, NETWORK)
                       ATTR   = scope value (SYSTEM, device name, task name, etc.)
                       ITEM   = attribute name (e.g. total, available, recv)
                       _name  = value of the optional "name" field in the condition
                     examples:
                       "CPU_SYSTEM_total"       cpu   → SYSTEM → total
                       "MEM_SYSTEM_available"   mem   → SYSTEM → available
                       "IO_SYSTEM_ioWait"       block → SYSTEM → ioWait
                       "NETWORK_eth0_recv"      net   → eth0   → recv
                       "STORAGE_sda1_usagePer"  storage → /dev/sda1 → usagePer
        - window:    time window in seconds to check (default 5)
        - minMatch:  minimum number of members that must fire within window (default 1)
        - commands:  list of embedded commands to run when group activates
        - oneshot:   "true" to disable the group after firing (default "false")
                     uses the same oneshot/refresh mechanism as threshold events
        - refresh:   re-enable the group after N ticks (monitoring intervals);
                     requires oneshot "true" (default 0)

    Use CMD_CORR:<group>:<window> inside a threshold command to dynamically
    update the window at runtime.

- COMMAND (embedded)
    - BUFFER{:SIZE}:            resize the monitoring buffer
    - CLEAR:                    clear the monitoring buffer
    - DISABLE{:RESOURCE}:       disable monitoring of the specific resource
    - ENABLE{:RESOURCE}:        enable monitoring of the specific resource
    - EXIT:                     terminate the Guider process
    - FILTER{:ITEM}:            set the task filter
    - INTERVAL{:SEC}:           change the monitoring interval
    - JOBS:                     print all worker tasks
    - KILL{:PID}:               kill specific worker tasks (SIGKILL)
    - OUTPATH:                  change the output path
    - PAUSE{:SEC}:              pause all monitoring activities with buffer clear
    - RELOAD{:PATH}:            reload the threshold config
    - RESET:                    clear the monitoring stats
    - RESTART:                  restart the Guider process
    - SAVE{:TICK@NAME#PATH}:    save the monitoring results to the file from the past to some time
                                thereafter buffer trim is applied if TIME is lesser than 0
                                PATH can be multiple paths separated by + sign as input
    - SAVEMIN{:TICK@NAME#PATH}: save the monitoring results composed only of minimal data
                                to the file from the past to some time thereafter
                                buffer trim is applied if TIME is lesser than 0
    - SAVERAW{:TICK@NAME#PATH}: save the monitoring results composed only of raw data
                                to the file from the past to some time thereafter
                                PATH can be multiple paths separated by + sign as input
    - SAVEBLOCK:                save current block usages
    - SAVECPU:                  save current cpu usages
    - SAVEMEM:                  save memory usages
    - SAVEMEMPROC:              save memory usages with smaps info
    - SAVEPID:                  save PIDs
    - SAVEPRIO:                 save priorities
    - SAVERUNTIME:              save runtimes
    - SAVESWAP:                 save swap usages
    - SAVETOTALBLOCK:           save total block usages
    - SAVETOTALCPU:             save total cpu usages
    - SLEEP{:SEC}:              sleep for seconds
    - STOP:                     stop the threshold monitoring
    - TERM{:PID}:               terminate specific worker tasks (SIGINT)
    - UPDATE:PATH               update the threshold data from the file
    - ASKAI{:<PROMPT>[#OPTS]}:  ask LLM to analyze the current event (log only)
    - ASKRUN{:<PROMPT>[#OPTS]}: ask LLM to analyze and auto-execute safe commands
                                OPTS: TIMEOUT:<s>, DRYRUN:<bool>, MAXCMD:<n>,
                                      CTXDEPTH:<n>, PROVIDER:<name>, MODEL:<name>,
                                      FEEDBACK:<s>, APIKEY:<key>, BASEURL:<url>
    - ASKMULTI{:<PROMPT>#PROVIDERS:<p1>:<p2>}: query multiple LLM providers in parallel
    - WEBHOOK:<URL>[#KEY:VAL,...]: POST JSON event snapshot to external endpoint
    - SNAPSHOT{:<LABEL>}:       save system snapshot JSON to the output directory
    - CORR:<GROUP>:<WINDOW>:    set event correlation window (ticks) for a group

- STARTCOND / EXITCOND (lifecycle)
    - STARTCONDPSICPU:<pct>:    start monitoring when PSI cpu.some.avg10 >= pct
    - STARTCONDPSIMEM:<pct>:    start monitoring when PSI memory.some.avg10 >= pct
    - STARTCONDPSIIO:<pct>:     start monitoring when PSI io.some.avg10 >= pct
    - STARTCONDLOAD:<load>:     start monitoring when 1m load average >= load
    - STARTCONDGPU:<pct>:       start monitoring when GPU load >= pct
    - EXITCONDPSICPU:<pct>:     stop monitoring when PSI cpu.some.avg10 >= pct
    - EXITCONDPSIMEM:<pct>:     stop monitoring when PSI memory.some.avg10 >= pct
    - EXITCONDPSIIO:<pct>:      stop monitoring when PSI io.some.avg10 >= pct
    - EXITCONDLOAD:<load>:      stop monitoring when 1m load average >= load
    - EXITCONDGPU:<pct>:        stop monitoring when GPU load >= pct

- PRINTCOND (output filter)
    - PSICPUCOND:<pct>:         print only when PSI cpu.some.avg10 >= pct
    - LOADCOND:<load>:          print only when 1m load average >= load
    - GPUCOND:<pct>:            print only when GPU load >= pct

- CHARACTER
    - #: ignore a line
    - ''': ignore specific range
'''

<init>
{
    "OPTION": ""
}

<threshold>
{

    "COMMAND": {

