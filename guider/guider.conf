[ Auto Command Description ]

- apply: switch flag; set to "true" to execute the command list at startup (default: "false")
- list:  list of commands to execute sequentially when apply is "true"

- CHARACTER
    - #: ignore a line
    - ''': ignore specific range
'''

<command>
{
    "apply": "false",
