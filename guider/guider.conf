        "#_llm_4": "Global -q options: LLMRATELIMIT:<s>, LLMDRYRUN:<bool>, LLMMAXCMD:<n>, LLMCTXDEPTH:<n>, LLMAUDITLOG:<path>, LLMALLOWCMD:<CMD1:CMD2>",
